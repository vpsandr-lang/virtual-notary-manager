<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Виртуальный офис-менеджер - Нотариальная контора</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; height: 100vh; width: 100vw; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }
        
        #ui-overlay {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .btn {
            width: 60px; height: 60px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            color: white; font-size: 24px; cursor: pointer;
            transition: all 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .btn:hover { transform: scale(1.1); border-color: rgba(255,255,255,0.6); }
        .btn.active { background: rgba(197,165,90,0.6); border-color: #c5a55a; box-shadow: 0 0 30px rgba(197,165,90,0.3); }
        .btn.listening { background: rgba(233,30,99,0.6); border-color: #e91e63; animation: pulse 1s infinite; }
        .btn.speaking { background: rgba(33,150,243,0.6); border-color: #2196f3; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }

        #webcam-container {
            position: fixed; bottom: 100px; right: 20px;
            width: 160px; height: 120px; border-radius: 12px;
            overflow: hidden; border: 2px solid rgba(255,255,255,0.2);
            z-index: 5; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        #webcam-feed { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); background: #1a1a2e; }

        #status-text {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            z-index: 5; color: rgba(255,255,255,0.7); font-size: 14px; text-align: center;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            padding: 8px 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
        }

        #greeting {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 5; color: rgba(197,165,90,0.9); font-size: 14px; letter-spacing: 3px;
            text-transform: uppercase; text-align: center;
            text-shadow: 0 0 20px rgba(197,165,90,0.3);
            background: rgba(0,0,0,0.4); padding: 8px 24px; border-radius: 20px;
            border: 1px solid rgba(197,165,90,0.2);
        }

        #logotype {
            position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
            z-index: 5; font-size: 10px; color: rgba(255,255,255,0.3);
            letter-spacing: 6px; text-transform: uppercase;
        }

        @media (max-width: 768px) {
            #webcam-container { width: 100px; height: 75px; bottom: 90px; right: 10px; }
            .btn { width: 50px; height: 50px; font-size: 20px; }
            #status-text { font-size: 12px; bottom: 90px; max-width: 80vw; }
            #greeting { font-size: 10px; top: 12px; padding: 5px 12px; letter-spacing: 2px; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="greeting">⚜ НОТАРИАЛЬНАЯ КОНТОРА "НОТАРИУС+" ⚜</div>
    
    <div id="webcam-container">
        <video id="webcam-feed" autoplay muted playsinline></video>
    </div>

    <div id="status-text">Нажмите на микрофон для начала разговора</div>

    <div id="ui-overlay">
        <button id="btn-mic" class="btn" title="Голосовой ввод">🎤</button>
        <button id="btn-speak" class="btn active" title="Озвучивание">🔊</button>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
            "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.5.3/lib/three-vrm.module.min.js"
        }
    }
    </script>
    <script type="module" src="scene.js"></script>
    <script type="module" src="voice.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
