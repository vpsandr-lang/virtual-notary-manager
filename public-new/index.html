<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Виртуальный офис-менеджер - Нотариальная контора "Нотариус+"</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            overflow: hidden; 
            height: 100vh; 
            width: 100vw; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
        }
        #canvas-container { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            z-index: 0; 
        }

        #greeting {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            color: rgba(197,165,90,0.7);
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-align: center;
            background: rgba(0,0,0,0.3);
            padding: 6px 20px;
            border-radius: 16px;
            border: 1px solid rgba(197,165,90,0.15);
            backdrop-filter: blur(8px);
            white-space: nowrap;
        }

        #webcam-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 100px;
            height: 75px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.15);
            z-index: 5;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            opacity: 0.6;
            transition: opacity 0.3s;
        }
        #webcam-container:hover { opacity: 1; }
        #webcam-feed { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); 
            background: #1a1a2e; 
        }

        @media (min-width: 768px) {
            #webcam-container {
                width: 140px;
                height: 105px;
                bottom: 30px;
                right: 30px;
            }
        }

        @media (max-width: 767px) {
            #greeting {
                font-size: 8px;
                letter-spacing: 2px;
                padding: 4px 12px;
                top: 10px;
                white-space: normal;
            }
            #webcam-container {
                width: 70px;
                height: 53px;
                bottom: 12px;
                right: 12px;
                border-radius: 8px;
                opacity: 0.5;
            }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="greeting">⚜ НОТАРИАЛЬНАЯ КОНТОРА "НОТАРИУС+" ⚜</div>
    
    <div id="webcam-container">
        <video id="webcam-feed" autoplay muted playsinline></video>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
            "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.5.3/lib/three-vrm.module.min.js"
        }
    }
    </script>
    <script type="module" src="scene.js"></script>
    <script type="module" src="voice.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
